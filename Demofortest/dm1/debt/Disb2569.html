<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สรุปผลตัวชี้วัดกองทุนพัฒนาบทบาทสตรี</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d81b60;
            --secondary-color: #880e4f;
            --accent-color: #f8bbd0;
            --bg-gradient: linear-gradient(to bottom right, #ffe6f0, #ffd1e6);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            background: var(--bg-gradient);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.2);
        }

        /* Header & Logos */
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--primary-color); margin: 0; font-size: 1.8rem; }
        .header p { color: var(--secondary-color); margin-top: 10px; font-weight: bold; }
        
        .logos { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .logos img { height: 50px; object-fit: contain; }

        /* Dashboard Cards */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--primary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
        }
        .card .label { color: #666; font-size: 0.9rem; margin-bottom: 5px; }
        .card .value { color: var(--secondary-color); font-size: 1.5rem; font-weight: bold; }

        /* Filters */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            background: #fce4ec;
            padding: 15px;
            border-radius: 15px;
        }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        select {
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--accent-color);
            font-family: 'Sarabun', sans-serif;
            outline: none;
        }

        /* Table Styles */
        .table-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 0.95rem;
        }
        th, td {
            border: 1px solid #f0a5bc; 
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: var(--accent-color);
            color: var(--secondary-color);
            cursor: pointer;
            position: relative;
            user-select: none;
        }
        th:hover { background-color: #f48fb1; }
        th i { margin-left: 5px; font-size: 0.8rem; opacity: 0.5; }

        tr:nth-child(even) { background-color: rgba(255,182,193,0.05); }
        tr:hover { background-color: rgba(216, 27, 96, 0.05); }

        .text-right { text-align: right; }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.4rem; }
            .filter-section { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logos">
        <img src="https://i.postimg.cc/507bjy9Z/cdd.png" alt="CDD Logo">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZtkPBp_xmIFgEEmX2cyScE1QzabzZbtNdbQ&s" alt="Women Fund Logo">
    </div>

    <div class="header">
        <h1 id="title-main">กำลังโหลดข้อมูล...</h1>
        <p id="title-sub"></p>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="label">งบประมาณจัดสรรทั้งหมด</div>
            <div class="value" id="sum-budget">0</div>
        </div>
        <div class="card">
            <div class="label">ผลการเบิกจ่ายสะสม</div>
            <div class="value" id="sum-spent">0</div>
        </div>
        <div class="card">
            <div class="label">ร้อยละการเบิกจ่ายเฉลี่ย</div>
            <div class="value" id="avg-percent">0%</div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <label>เขตตรวจ:</label>
            <select id="filter-zone">
                <option value="">ทั้งหมด</option>
            </select>
        </div>
        <div class="filter-group">
            <label>จังหวัด:</label>
            <select id="filter-province">
                <option value="">ทั้งหมด</option>
            </select>
        </div>
    </div>

    <div class="table-container">
        <table id="kpiTable">
            <thead>
                <tr id="table-header">
                    </tr>
            </thead>
            <tbody>
                <tr><td colspan="5">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdHG7L8V_5Rk0_PRqE-yR7ID8MQr14csA-GCm-qkAHzK4yRn6sb2dt9dMwnlBKlAGKajuQNAckWq4F/pub?gid=0&single=true&output=csv";

let rawData = [];
let filteredData = [];
let currentSort = { col: -1, asc: true };

function parseCSV(text) {
    const lines = text.split('\n');
    return lines.map(line => {
        const result = [];
        let cur = '';
        let inQuote = false;
        for (let char of line) {
            if (char === '"') inQuote = !inQuote;
            else if (char === ',' && !inQuote) {
                result.push(cur.replace(/^"|"$/g, '').trim());
                cur = '';
            } else cur += char;
        }
        result.push(cur.replace(/^"|"$/g, '').trim());
        return result;
    });
}

function formatNum(num) {
    return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
}

async function fetchData() {
    try {
        const response = await fetch(csvUrl);
        const csvText = await response.text();
        const data = parseCSV(csvText);

        // A1, A2
        document.getElementById('title-main').innerText = data[0][0];
        document.getElementById('title-sub').innerText = data[1][0];

        // A3:E3 (Headers)
        const headers = data[2].slice(0, 5);
        const headerRow = document.getElementById('table-header');
        headerRow.innerHTML = headers.map((h, i) => `
            <th onclick="sortData(${i})">${h} <i class="fa-solid fa-sort"></i></th>
        `).join('');

        // A4:E79 (Data)
        rawData = data.slice(3, 80)
            .filter(row => row[1]) // กรองแถวว่างที่ไม่มีชื่อจังหวัด
            .map(row => ({
                zone: row[0],
                province: row[1],
                budget: parseFloat(row[2].replace(/,/g, '')) || 0,
                spent: parseFloat(row[3].replace(/,/g, '')) || 0,
                percent: parseFloat(row[4].replace(/%/g, '')) || 0,
                originalRow: row.slice(0, 5)
            }));

        initFilters();
        updateDisplay();

    } catch (error) {
        console.error("Error:", error);
        document.querySelector('tbody').innerHTML = `<tr><td colspan="5" style="color:red;">โหลดข้อมูลไม่สำเร็จ</td></tr>`;
    }
}

function initFilters() {
    const zones = [...new Set(rawData.map(d => d.zone))].sort();
    const zoneSelect = document.getElementById('filter-zone');
    
    // เคลียร์และเติมข้อมูลเขตตรวจ
    zoneSelect.innerHTML = '<option value="">ทั้งหมด</option>';
    zones.forEach(z => zoneSelect.innerHTML += `<option value="${z}">${z}</option>`);

    // เรียกฟังก์ชันเติมรายชื่อจังหวัดครั้งแรก
    updateProvinceFilter();

    // เมื่อเปลี่ยนเขตตรวจ ให้กรองจังหวัดใหม่ และอัปเดตการแสดงผล
    zoneSelect.addEventListener('change', () => {
        updateProvinceFilter();
        updateDisplay();
    });
    
    document.getElementById('filter-province').addEventListener('change', updateDisplay);
}

function updateProvinceFilter() {
    const zoneVal = document.getElementById('filter-zone').value;
    const provSelect = document.getElementById('filter-province');
    
    // กรองรายชื่อจังหวัดตามเขตที่เลือก
    const filteredProvinces = rawData
        .filter(d => zoneVal === "" || d.zone === zoneVal)
        .map(d => d.province);
    
    const uniqueProvinces = [...new Set(filteredProvinces)].sort();

    // เก็บค่าจังหวัดที่เคยเลือกไว้ (ถ้ามี)
    const currentSelectedProv = provSelect.value;

    // เติมรายชื่อจังหวัดใหม่เข้าไปใน Dropdown
    provSelect.innerHTML = '<option value="">ทั้งหมด</option>';
    uniqueProvinces.forEach(p => {
        provSelect.innerHTML += `<option value="${p}">${p}</option>`;
    });

    // ถ้าจังหวัดเดิมที่เคยเลือกยังอยู่ใน List ใหม่ ให้เลือกค่าเดิมไว้
    if (uniqueProvinces.includes(currentSelectedProv)) {
        provSelect.value = currentSelectedProv;
    }
}

function sortData(colIndex) {
    if (currentSort.col === colIndex) {
        currentSort.asc = !currentSort.asc;
    } else {
        currentSort.col = colIndex;
        currentSort.asc = true;
    }
    updateDisplay();
}

function updateDisplay() {
    const zoneVal = document.getElementById('filter-zone').value;
    const provVal = document.getElementById('filter-province').value;

    // Filtering
    filteredData = rawData.filter(d => {
        return (zoneVal === "" || d.zone === zoneVal) &&
               (provVal === "" || d.province === provVal);
    });

    // Sorting
    if (currentSort.col !== -1) {
        filteredData.sort((a, b) => {
            let valA = a.originalRow[currentSort.col];
            let valB = b.originalRow[currentSort.col];
            
            // ตรวจสอบว่าเป็นตัวเลขหรือไม่
            const numA = parseFloat(valA.replace(/,/g, ''));
            const numB = parseFloat(valB.replace(/,/g, ''));
            
            if (!isNaN(numA) && !isNaN(numB)) {
                return currentSort.asc ? numA - numB : numB - numA;
            }
            return currentSort.asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });
    }

    renderTable();
    updateCards();
}

function renderTable() {
    const tbody = document.querySelector('tbody');
    tbody.innerHTML = filteredData.map(d => `
        <tr>
            <td>${d.zone}</td>
            <td style="text-align:left;">${d.province}</td>
            <td class="text-right">${formatNum(d.budget)}</td>
            <td class="text-right">${formatNum(d.spent)}</td>
            <td>${d.percent.toFixed(2)}%</td>
        </tr>
    `).join('');
}

function updateCards() {
    const totalBudget = filteredData.reduce((s, c) => s + c.budget, 0);
    const totalSpent = filteredData.reduce((s, c) => s + c.spent, 0);
    const avgPercent = totalBudget > 0 ? (totalSpent / totalBudget) * 100 : 0;

    document.getElementById('sum-budget').innerText = formatNum(totalBudget);
    document.getElementById('sum-spent').innerText = formatNum(totalSpent);
    document.getElementById('avg-percent').innerText = avgPercent.toFixed(2) + '%';
}

fetchData();
</script>

</body>
</html>
