<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สรุปผลตัวชี้วัดกองทุนพัฒนาบทบาทสตรี</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Sarabun', sans-serif;
    margin: 0;
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: linear-gradient(to bottom right, #ffe6f0, #ffd1e6);
  }
  .container {
    width: 100%;
    max-width: 1200px;
    background-color: rgba(255, 255, 255, 0.95);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 8px 25px rgba(233, 30, 99, 0.3);
  }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header h1 {
    color: #d81b60;
    margin: 0;
    font-size: 1.8rem;
  }
  .header p {
    color: #880e4f;
    margin-top: 10px;
    font-weight: bold;
    font-size: 1.1rem;
  }
  .logos {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
  }
  .logos img { height: 60px; }
  
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: white;
  }
  th, td {
    border: 1px solid #f0a5bc; 
    padding: 10px 12px;
    text-align: center;
  }
  th {
    background-color: #f8bbd0;
    color: #880e4f;
    font-weight: bold;
  }
  tr:nth-child(even) { background-color: rgba(255,182,193,0.1); }
  
  /* Modal Styles */
  .modal {
    display: none; 
    position: fixed;
    z-index: 1000;
    left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
  }
  .modal-content {
    background-color: #fff;
    margin: 5% auto;
    padding: 25px;
    width: 90%;
    max-width: 600px;
    border-radius: 15px;
    position: relative;
    animation: animatetop 0.4s;
  }
  @keyframes animatetop { from {top: -300px; opacity: 0} to {top: 0; opacity: 1} }
  .close-button {
    float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa;
  }
  .clickable-kpi {
    cursor: pointer;
    color: #d81b60;
    text-decoration: underline;
  }
  .status-true { color: green; font-weight: bold; }
  .status-false { color: red; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 id="title-main">กำลังโหลดข้อมูล...</h1>
    <p id="title-sub"></p>
  </div>
  
  <div class="logos">
    <img src="https://i.postimg.cc/507bjy9Z/cdd.png" alt="CDD Logo">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZtkPBp_xmIFgEEmX2cyScE1QzabzZbtNdbQ&s" alt="Women Fund Logo">
  </div>

  <table id="kpiTable">
    <thead>
      <tr>
        <th>ด้าน</th>
        <th>เกณฑ์วัดการดำเนินงาน</th>
        <th>หน่วยวัด</th>
        <th>เป้าหมาย</th>
        <th>ผลงาน</th>
        <th>หมายเหตุ</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="6">กำลังโหลดข้อมูล...</td></tr>
    </tbody>
  </table>
</div>

<script>
// URL ของ CSV ที่คุณให้มา
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5DsnIUbdyom73CkROGq93nQjx9GKsxJaP_ttsie4KlDViwLoDoSJk5zY8ZRSqZ8dp6ModMfnLC9tC/pub?output=csv";

// ฟังก์ชันสำหรับแยกข้อมูล CSV (Handling commas inside quotes)
function parseCSV(text) {
    const lines = text.split('\n');
    return lines.map(line => {
        const result = [];
        let cur = '';
        let inQuote = false;
        for (let char of line) {
            if (char === '"') inQuote = !inQuote;
            else if (char === ',' && !inQuote) {
                result.push(cur.trim());
                cur = '';
            } else cur += char;
        }
        result.push(cur.trim());
        return result;
    });
}

async function fetchData() {
    const tbody = document.querySelector('#kpiTable tbody');
    const titleMain = document.getElementById('title-main');
    const titleSub = document.getElementById('title-sub');

    try {
        const response = await fetch(csvUrl);
        const csvText = await response.text();
        const data = parseCSV(csvText);

        // 1. ตั้งค่าหัวข้อจาก A1 และ A2
        if (data[0]) titleMain.innerText = data[0][0] || "สรุปผลการดำเนินงาน";
        if (data[1]) titleSub.innerText = data[1][0] || "";

        // 2. ล้างข้อมูลตารางเก่า
        tbody.innerHTML = '';

        // 3. วนลูปข้อมูลแถวที่ 4 ถึง 24 (Index 3 ถึง 23)
        // หมายเหตุ: ปรับช่วง index ตามความต้องการ (A3 คือ index 2)
        for (let i = 3; i < Math.min(data.length, 19); i++) {
            const row = data[i];
            if (!row[0] && !row[1]) continue; // ข้ามแถวว่าง

            const tr = document.createElement('tr');
            
            // สร้าง Cell ข้อมูล (A-F)
            tr.innerHTML = `
                <td>${row[0] || ''}</td>
                <td>
                    ${row[1] || ''}
                </td>
                <td>${row[2] || ''}</td>
                <td>${row[3] || ''}</td>
                <td>${row[4] || ''}</td>
                <td>${row[5] || ''}</td>
            `;

            // เพิ่ม Event คลิกถ้าเป็นตัวชี้วัด 1.1
            

            tbody.appendChild(tr);
        }

    } catch (error) {
        console.error("Error:", error);
        tbody.innerHTML = `<tr><td colspan="6" style="color:red;">ไม่สามารถโหลดข้อมูลได้: ${error.message}</td></tr>`;
    }
}

// เริ่มการทำงาน
fetchData();
</script>

</body>
</html>
