<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDD Women Fund Dashboard (3 Items)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #E02B72;
            --light-pink-bg: #FFF0F5;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--light-pink-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            background: #ffffff;
            width: 100%;
            max-width: 950px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
        }

        .header-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            min-height: 80px;
        }

        .header-title-container {
            text-align: center;
            width: 100%;
            padding: 0 120px;
        }

        .main-title {
            color: var(--primary-pink);
            font-size: 32px;
            font-weight: 700;
        }

        .sub-title-eng {
            color: var(--primary-pink);
            font-size: 20px;
            font-weight: 600;
            margin-top: -5px;
            display: block;
        }

        .sub-title-th {
            color: #555;
            font-size: 13px;
            margin-top: 5px;
        }

        .logos-right {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .logo-right-img {
            height: 50px;
            width: auto;
        }

        .btn-back-left {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #666666;
            font-size: 15px;
            font-weight: 600;
            background-color: #f5f5f7;
            padding: 10px 18px;
            border-radius: 50px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
            z-index: 10;
        }

        .btn-back-left:hover {
            background-color: var(--primary-pink);
            color: #ffffff;
            transform: translateY(-50%) translateX(-3px);
            box-shadow: 0 4px 10px rgba(224, 43, 114, 0.2);
        }

        .btn-back-left svg {
            fill: currentColor;
        }

        /* --- โครงสร้างการ์ดสี่เหลี่ยม 3 คอลัมน์ (Grid Layout) --- */
        .menu-grid-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .menu-item {
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 35px 20px;
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .item-orange { background-color: #FFF2D9; }
        .item-blue   { background-color: #E3F5FF; }
        .item-green  { background-color: #E2F9F3; }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
        }

        .menu-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            object-fit: contain;
            background: #ffffff;
            padding: 12px;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        }

        .menu-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.4;
            color: #111111;
        }

        .menu-desc {
            font-size: 12px;
            color: #555555;
            line-height: 1.4;
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 768px) {
            .header-section { flex-direction: column; gap: 15px; min-height: auto; }
            .header-title-container { padding: 0; }
            .btn-back-left { position: relative; transform: none; top: auto; left: auto; margin-bottom: 5px; }
            .logos-right { position: relative; right: auto; top: auto; transform: none; order: -1; }
            .main-title { font-size: 26px; }
            
            .menu-grid-wrapper { grid-template-columns: 1fr; gap: 15px; }
            .menu-item { flex-direction: row; text-align: left; padding: 20px; gap: 15px; align-items: center; }
            .menu-icon { margin-bottom: 0; width: 50px; height: 50px; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="header-section">
            <a href="index.html" class="btn-back-left">
                <svg width="16" height="16" viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                ย้อนกลับ
            </a>

            <div class="header-title-container">
                <h1 class="main-title">CDD Women Fund</h1>
                <span class="sub-title-eng">— Dashboard —</span>
                <p class="sub-title-th">การบริหารเงินทุนและหนี้</p>
            </div>
            <div class="logos-right">
                <img class="logo-right-img" src="img/cdd.png" alt="Gov Logo 1">
                <img class="logo-right-img" src="img/logo.png" alt="Gov Logo 2">
            </div>
        </header>

        <div class="menu-grid-wrapper">

            <a href="debt/Disb2569.html" class="menu-item item-orange">
                <img class="menu-icon" src="img/documents.png" alt="Icon">
                <div class="menu-text-wrapper">
                    <div class="menu-title">ร้อยละการเบิกจ่ายเงินทุนหมุนเวียน 2569</div>
                    <div class="menu-desc"></div>
                </div>
            </a>

            <a href="debt/Due-Dep-sys/summary.html" class="menu-item item-blue">
                <img class="menu-icon" src="img/kpi.png" alt="Icon">
                <div class="menu-text-wrapper">
                    <div class="menu-title">ร้อยละการชำระคืนเงินต้น 2569</div>
                    <div class="menu-desc"></div>
                </div>
            </a>

            <a href="debt/KPI2569.html" class="menu-item item-green">
                <img class="menu-icon" src="img/interface.png" alt="Icon">
                <div class="menu-text-wrapper">
                    <div class="menu-title">ร้อยละหนี้ค้างชำระ 2569</div>
                    <div class="menu-desc"></div>
                </div>
            </a>

        </div>
    </div>

</body>
</html>
