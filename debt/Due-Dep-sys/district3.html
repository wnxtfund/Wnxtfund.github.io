<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>สรุปรายอำเภอ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root {
            --pink: #e91e63;
            --deep-pink: #c2185b;
            --navy: #1a237e;
            --bg1: #fce4ec;
            --bg2: #f5f5f5;
            --border: #d1c4e9;
            --green: #2e7d32;
            --deep-green: #1b5e20;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            background: linear-gradient(to bottom right, var(--bg1), var(--bg2));
        }

        /* ===== Nav ===== */
        .navbar {
            background: linear-gradient(90deg, #1a237e, #283593);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-weight: 700;
        }

        .navbar button {
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .4);
            color: #fff;
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Sarabun';
            font-size: .85rem;
            transition: .2s;
        }

        .navbar button:hover {
            background: rgba(255, 255, 255, .25);
        }

        /* ===== Main ===== */
        .main {
            max-width: 1300px;
            margin: auto;
            padding: 26px 20px;
        }

        h2 {
            color: var(--deep-pink);
            margin: 0 0 14px;
        }

        .btn {
            background: linear-gradient(135deg, var(--pink), var(--deep-pink));
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
            font-family: 'Sarabun';
            font-size: .85rem;
            font-weight: 700;
            margin-bottom: 14px;
            transition: transform .15s ease, box-shadow .15s ease;
            margin-right: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(233, 30, 99, .35);
        }

        .btn-download {
            background: linear-gradient(135deg, var(--green), var(--deep-green));
        }

        .btn-download:hover {
            box-shadow: 0 6px 14px rgba(46, 125, 50, 0.35);
        }

        /* ===== Filter Section ===== */
        .filter-container {
            background: #fff;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-weight: 700;
            color: var(--navy);
            font-size: 0.95rem;
        }

        /* ตกแต่งกล่องปฏิทินใหม่ */
        .filter-group input.thai-date-picker {
            font-family: 'Sarabun';
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            background-color: #fff;
            cursor: pointer;
            width: 160px;
            text-align: center;
        }

        .filter-group input.thai-date-picker:focus {
            border-color: var(--pink);
        }

        .btn-clear {
            background: #757575;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-family: 'Sarabun';
            font-size: 0.85rem;
            transition: 0.2s;
            font-weight: 700;
        }

        .btn-clear:hover {
            background: #424242;
        }

        /* ===== Table ===== */
        .table-wrapper {
            overflow-x: auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .08);
        }

        table {
            width: 100%;
            min-width: 1000px;
            border-collapse: collapse;
            border: 2px solid var(--border);
        }

        th,
        td {
            border: 1.5px solid var(--border);
            padding: 8px 10px;
            text-align: center;
            font-size: .9rem;
            white-space: nowrap;
        }

        th {
            background: #fce4ec;
            color: #880e4f;
            font-weight: 700;
        }

        tbody tr:nth-child(even) td {
            background: #fafafa;
        }

        tbody tr:hover td {
            background: #fde7f3;
        }

        tfoot td {
            font-weight: 700;
            background: #f8bbd0;
            color: #4a0033;
        }

        /* ปรับแต่งปี พ.ศ. ในตัวปฏิทิน Flatpickr */
        .flatpickr-calendar {
            font-family: 'Sarabun', sans-serif !important;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div>CDD Women Fund</div>
        <button onclick="logout()">ออกจากระบบ</button>
    </div>

    <div class="main">
        <h2 id="title">กำลังโหลดข้อมูล…</h2>
        <p>*หมายเหตุ เงินต้นที่รับคืนถึง ณ วันที่ 30 ก.ย. 69</p>
        
        <div style="margin-bottom: 5px;">
            <button class="btn" onclick="goAllProjects()">
                ดูโครงการทั้งหมด
            </button>
            <button class="btn btn-download" onclick="downloadCSV()">
                📥 ดาวน์โหลดข้อมูล (Excel/CSV)
            </button>
        </div>

        <div class="filter-container">
            <div class="filter-group">
                <label>ค้นหากำหนดชำระ ตั้งแต่วันที่:</label>
                <input type="text" id="startDate" class="thai-date-picker" placeholder="เลือกวันที่เริ่มต้น">
            </div>
            <div class="filter-group">
                <label>ถึงวันที่:</label>
                <input type="text" id="endDate" class="thai-date-picker" placeholder="เลือกวันที่สิ้นสุด">
            </div>
            <button class="btn-clear" onclick="clearFilter()">ล้างตัวกรอง</button>
        </div>

        <div class="table-wrapper">
            <table id="tbl">
                <thead></thead>
                <tbody></tbody>
                <tfoot></tfoot>
            </table>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const province = params.get("province");
        const token = params.get("token");

        if (!province || !token) {
            alert("กรุณาเข้าสู่ระบบใหม่");
            location.href = "login.html";
        }

        title.innerText = `สรุปรายอำเภอ จังหวัด${province}`;

        let rawApiData = [];
        let currentCalculatedData = []; // เก็บข้อมูลที่คำนวณและกรองแล้วไว้สำหรับดาวน์โหลด
        let startPicker, endPicker;

        const START = new Date("2025-10-01");
        const SEP30 = new Date("2026-09-30");

        // เปิดใช้งานระบบปฏิทินไทย พ.ศ.
        document.addEventListener("DOMContentLoaded", function() {
            const flatpickrConfig = {
                locale: "th",
                dateFormat: "Y-m-d",
                altInput: true,
                altFormat: "d ม.ค. Y",
                // แปลงปี ค.ศ. เป็น พ.ศ. ในหน้าต่างปฏิทินให้ผู้ใช้เห็น
                onReady: function(selectedDates, dateStr, instance) {
                    const yearSelects = instance.calendarContainer.querySelectorAll('.flatpickr-monthDropdown-months');
                    instance.yearElements.forEach(elem => {
                        if(elem.value) {
                            elem.value = parseInt(elem.value) + 543;
                        }
                    });
                },
                onYearChange: function(selectedDates, dateStr, instance) {
                    setTimeout(() => {
                        instance.yearElements.forEach(elem => {
                            if(elem.value) {
                                elem.value = parseInt(instance.currentYear) + 543;
                            }
                        });
                    }, 0);
                },
                onOpen: function(selectedDates, dateStr, instance) {
                    instance.yearElements.forEach(elem => {
                        if(elem.value) {
                            elem.value = parseInt(instance.currentYear) + 543;
                        }
                    });
                },
                onChange: function(selectedDates, dateStr, instance) {
                    filterData();
                }
            };

            startPicker = flatpickr("#startDate", flatpickrConfig);
            endPicker = flatpickr("#endDate", flatpickrConfig);
        });

        fetch(`${API}?province=${encodeURIComponent(province)}&token=${encodeURIComponent(token)}`)
            .then(r => r.json())
            .then(res => {
                rawApiData = res.data || [];
                const summary = summarizeByDistrict(rawApiData);
                renderTable(summary);
            });

        function summarizeByDistrict(data, customStart = null, customEnd = null) {
            const map = {};

            const filterStart = customStart ? new Date(customStart) : START;
            const filterEnd = customEnd ? new Date(customEnd) : SEP30;

            data.forEach(r => {
                if (r["สถานะการมีข้อมูลใน ค-ง"] !== "ไม่มีข้อมูล") return;

                const district = r["อำเภอ"];
                const due = new Date(r["กำหนดชำระ"]);
                if (isNaN(due)) return;

                if (due >= filterStart && due <= filterEnd) {
                    if (!map[district]) {
                        map[district] = { expect_sep: 0, paid: 0 };
                    }

                    const expect = Number(r["เงินต้นที่คาดว่าจะได้"] || 0);
                    const paid = Number(r["เงินต้นรับคืน"] || 0);

                    map[district].expect_sep += expect;
                    map[district].paid += paid;
                }
            });

            currentCalculatedData = Object.entries(map).map(([d, v]) => ({
                อำเภอ: d,
                "เงินต้นที่ได้รับชำระคืนแล้ว": v.paid,
                "เงินต้นเป้าหมายการรับชำระคืน ณ 30 ก.ย. 69": v.expect_sep,
                "ร้อยละ (30 ก.ย. 69)": v.expect_sep ? v.paid * 100 / v.expect_sep : 0
            }));

            return currentCalculatedData;
        }

        function renderTable(data) {
            const thead = tbl.querySelector("thead");
            const tbody = tbl.querySelector("tbody");
            const tfoot = tbl.querySelector("tfoot");

            thead.innerHTML = "";
            tbody.innerHTML = "";
            tfoot.innerHTML = "";

            if (!data || data.length === 0) {
                thead.innerHTML = `<tr><th>ข้อมูล</th></tr>`;
                tbody.innerHTML = `<tr><td>ไม่พบข้อมูลในช่วงเวลาที่เลือก</td></tr>`;
                return;
            }

            const headers = [...Object.keys(data[0]), "ดูโครงการ"];

            thead.innerHTML =
                `<tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr>`;

            let sum_expect_sep = 0;
            let sum_paid = 0;

            data.forEach(r => {
                const tr = document.createElement("tr");

                headers.forEach(h => {
                    let td = document.createElement("td");

                    if (h === "ดูโครงการ") {
                        td.innerHTML =
                            `<button class="btn" onclick="goProject('${r.อำเภอ}')">ดูโครงการ</button>`;
                    } else {
                        let v = r[h];
                        if (typeof v === "number") {
                            v = h.includes("ร้อยละ")
                                ? v.toFixed(2)
                                : v.toLocaleString();
                        }
                        td.innerText = v;
                    }
                    tr.appendChild(td);
                });

                sum_expect_sep += r["เงินต้นเป้าหมายการรับชำระคืน ณ 30 ก.ย. 69"];
                sum_paid += r["เงินต้นที่ได้รับชำระคืนแล้ว"];

                tbody.appendChild(tr);
            });

            const percent_sep = sum_expect_sep ? sum_paid * 100 / sum_expect_sep : 0;

            tfoot.innerHTML = `
                <tr>
                    <td><strong>รวมทั้งจังหวัด</strong></td>
                    <td>${sum_paid.toLocaleString()}</td>
                    <td>${sum_expect_sep.toLocaleString()}</td>
                    <td>${percent_sep.toFixed(2)}</td>
                    <td>-</td>
                </tr>
            `;
        }

        function filterData() {
            const startVal = document.getElementById("startDate").value;
            const endVal = document.getElementById("endDate").value;

            const customStart = startVal ? startVal : "1970-01-01";
            const customEnd = endVal ? endVal : "2099-12-31";

            const filteredSummary = summarizeByDistrict(rawApiData, customStart, customEnd);
            renderTable(filteredSummary);
        }

        function clearFilter() {
            if (startPicker) startPicker.clear();
            if (endPicker) endPicker.clear();
            const summary = summarizeByDistrict(rawApiData);
            renderTable(summary);
        }

        // ฟังก์ชันดาวน์โหลดไฟล์ CSV รองรับภาษาไทยเปิดใน Excel ได้โดยตรง ไม่เป็นภาษาต่างดาว
        function downloadCSV() {
            if (!currentCalculatedData || currentCalculatedData.length === 0) {
                alert("ไม่มีข้อมูลสำหรับดาวน์โหลดในช่วงเวลาดังกล่าว");
                return;
            }

            // ตั้งหัวคอลัมน์ในไฟล์ Excel
            const headers = ["อำเภอ", "เงินต้นที่ได้รับชำระคืนแล้ว", "เงินต้นเป้าหมายการรับชำระคืน ณ 30 ก.ย. 69", "ร้อยละ (30 ก.ย. 69)"];
            let csvContent = headers.join(",") + "\n";

            let totalPaid = 0;
            let totalExpect = 0;

            // วนลูปดึงข้อมูลรายอำเภอ
            currentCalculatedData.forEach(r => {
                const row = [
                    `"${r.อำเภอ}"`,
                    r["เงินต้นที่ได้รับชำระคืนแล้ว"],
                    r["เงินต้นเป้าหมายการรับชำระคืน ณ 30 ก.ย. 69"],
                    r["ร้อยละ (30 ก.ย. 69)"].toFixed(2)
                ];
                csvContent += row.join(",") + "\n";

                totalPaid += r["เงินต้นที่ได้รับชำระคืนแล้ว"];
                totalExpect += r["เงินต้นเป้าหมายการรับชำระคืน ณ 30 ก.ย. 69"];
            });

            // เพิ่มแถวผลรวมทั้งจังหวัดท้ายไฟล์
            const totalPercent = totalExpect ? (totalPaid * 100 / totalExpect).toFixed(2) : "0.00";
            csvContent += `"${"รวมทั้งจังหวัด"}",${totalPaid},${totalExpect},${totalPercent}\n`;

            // ใส่รหัส BOM (\uFEFF) นำหน้าไฟล์ เพื่อบังคับให้ Excel เปิดอ่านภาษาไทยได้ถูกต้อง ไม่เป็นภาษาต่างดาว
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            
            // ตั้งชื่อไฟล์ตามช่วงเวลาและจังหวัดที่กรองอยู่
            const startVal = document.getElementById("startDate").value || "เริ่มต้น";
            const endVal = document.getElementById("endDate").value || "สิ้นสุด";
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `สรุปรายอำเภอ_จังหวัด${province}_(${startVal}_ถึง_${endVal}).csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function goProject(district) {
            location.href =
                `project-info.html?province=${encodeURIComponent(province)}&district=${encodeURIComponent(district)}&token=${encodeURIComponent(token)}`;
        }

        function logout() {
            location.href = "login.html";
        }

        function goAllProjects() {
            location.href =
                `project-info.html?province=${encodeURIComponent(province)}&token=${encodeURIComponent(token)}`;
        }
    </script>

</body>

</html>
