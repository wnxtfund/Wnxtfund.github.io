<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานผลกองทุนพัฒนาบทบาทสตรี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .table-container { width: 100%; overflow: auto; border-radius: 0.75rem; }
        table { border-collapse: collapse; min-width: 1600px; }
        th, td { padding: 10px; border: 1px solid #e2e8f0; white-space: nowrap; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; overflow: visible; }
            .container-box { box-shadow: none !important; border: none !important; padding: 0 !important; width: 100% !important; max-width: none !important; }
            .table-container { overflow: visible !important; }
            table { font-size: 8px !important; min-width: 100% !important; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "xlsx": "https://esm.sh/xlsx@0.18.5"
      }
    }
    </script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback, useMemo, useRef } from 'react';
        import ReactDOM from 'react-dom/client';
        import * as XLSX from 'xlsx';

        const API_URL = 'https://script.google.com/macros/s/AKfycbxIDBqQkRdzRZsFsqTrxcdCg0FXY-NoxZ8UaFFKNG9oOGWr3G67vYmjw4vEpXoKLbH1_Q/exec';
        const LOGO_CDD = 'https://i.postimg.cc/507bjy9Z/cdd.png';
        const LOGO_WOMEN = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZtkPBp_xmIFgEEmX2cyScE1QzabzZbtNdbQ&s';
        const ICON_HOME = 'https://cdn-icons-png.flaticon.com/512/25/25694.png';

        const START_BODY_ROW = 5;
        const DISPLAY_COLS = [0, 1, 2, 3, 5, 6, 7, 8, 10, 11, 12, 13, 15, 16, 17, 18, 19, 20];

        const THEMES = {
            'ไตรมาส 1-2': { main: '#fce4ec', header: '#f8bbd0', dark: '#880e4f', border: '#f48fb1' },
            'ไตรมาส 3-4': { main: '#f3e5f5', header: '#e1bee7', dark: '#4a148c', border: '#ce93d8' }
        };

        const App = () => {
            const [currentQuarter, setCurrentQuarter] = useState('ไตรมาส 1-2');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');
            const [isExportOpen, setIsExportOpen] = useState(false);
            const exportRef = useRef(null);
            const theme = THEMES[currentQuarter];

            const asOfDate = useMemo(() => {
                if (data.length < 3) return "";
                return data[2].find(cell => String(cell).includes("ข้อมูล ณ วันที่")) || "";
            }, [data]);

            const fetchData = useCallback(async (quarter) => {
                setLoading(true);
                try {
                    const response = await fetch(`${API_URL}?sheetName=${encodeURIComponent(quarter)}`);
                    const resJson = await response.json();
                    let raw = resJson.data;

                    let headerPart = raw.slice(0, START_BODY_ROW);
                    let bodyPart = raw.slice(START_BODY_ROW).filter(row => {
                        const val = String(row[1] || row[0] || "");
                        return val && !val.includes("1) กรณีจังหวัด") && !val.includes("2) เป้าหมายหนี้");
                    });

                    bodyPart = bodyPart.map(row => {
                        const newRow = [...row];
                        if (newRow[0] !== "รวม") [newRow[1], newRow[2]] = [newRow[2], newRow[1]];
                        return newRow;
                    });

                    const normalRows = bodyPart.filter(r => r[0] !== "รวม").sort((a, b) => {
                        const getNum = (v) => parseInt(String(v).replace(/[^0-9]/g, '')) || 0;
                        return getNum(a[1]) - getNum(b[1]);
                    });
                    const summaryRows = bodyPart.filter(r => r[0] === "รวม");
                    setData([...headerPart, ...normalRows, ...summaryRows]);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            }, []);

            useEffect(() => {
                fetchData(currentQuarter);
                const clickOutside = (e) => { if (exportRef.current && !exportRef.current.contains(e.target)) setIsExportOpen(false); };
                window.addEventListener('mousedown', clickOutside);
                return () => window.removeEventListener('mousedown', clickOutside);
            }, [currentQuarter, fetchData]);

            const exportExcel = () => {
                const head = [[data[0]?.[0]], [data[1]?.[0]], [asOfDate], [], ["ลำดับ", "เขต", "จังหวัด", "ได้รับจัดสรร", "ใช้จ่ายจริง", "ร้อยละ(A)", "คะแนน(A)", "ครบกำหนด", "ชำระจริง", "ร้อยละ(B)", "คะแนน(B)", "ต้นปีบัญชี", "หนี้เกินกำหนด", "ร้อยละ(C)", "คะแนน(C)", "คะแนนรวม", "ระดับ", "หมายเหตุ"]];
                const rows = data.slice(START_BODY_ROW).map(r => r[0] === "รวม" ? ["รวมทั้งสิ้น", "", "", ...DISPLAY_COLS.slice(3).map(idx => r[idx])] : DISPLAY_COLS.map(idx => r[idx]));
                const ws = XLSX.utils.aoa_to_sheet([...head, ...rows]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Report");
                XLSX.writeFile(wb, `รายงาน_${currentQuarter}.xlsx`);
                setIsExportOpen(false);
            };

            const formatValue = (val, colIdx) => {
                if (!val && val !== 0) return '';
                if ([3,5,6,7,8,10,11,12,13,15,16,17,18].includes(colIdx)) {
                    const num = parseFloat(String(val).replace(/,/g, ''));
                    return isNaN(num) ? val : num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                }
                return val;
            };

            return (
                <div className="min-h-screen p-4 flex flex-col items-center">
                    <div className="w-full max-w-[1800px] bg-white rounded-2xl shadow-2xl p-6 container-box flex flex-col h-[92vh]">
                        
                        {/* Header Section */}
                        <div className="flex justify-between items-start mb-2 no-print">
                            <button onClick={() => window.location.href='Menu.html'} className="flex items-center gap-2 px-4 py-2 rounded-xl font-bold border-2 transition-all hover:bg-gray-50 text-xs" style={{ color: theme.dark, borderColor: theme.dark }}>
                                <img src={ICON_HOME} className="h-4" /> เมนูหลัก
                            </button>
                            <div className="text-center flex-1">
                                <h1 className="text-xl font-bold" style={{ color: theme.dark }}>{data[0]?.[0]}</h1>
                                <p className="text-sm opacity-80">{data[1]?.[0]}</p>
                                <p className="text-xs font-bold text-gray-500 mt-1 underline italic">{asOfDate}</p>
                            </div>
                            <div className="flex gap-4">
                                <img src={LOGO_CDD} className="h-12 object-contain" />
                                <img src={LOGO_WOMEN} className="h-12 object-contain" />
                            </div>
                        </div>

                        {/* Toolbar */}
                        <div className="flex flex-wrap items-center justify-between gap-4 bg-gray-50 p-4 rounded-2xl mb-4 no-print border border-gray-100 shadow-inner">
                            <div className="flex items-center gap-3">
                                <select value={currentQuarter} onChange={(e) => setCurrentQuarter(e.target.value)} className="p-2 border rounded-xl text-sm font-bold bg-white" style={{ borderColor: theme.border }}>
                                    <option value="ไตรมาส 1-2">ไตรมาส 1-2</option>
                                    <option value="ไตรมาส 3-4">ไตรมาส 3-4</option>
                                </select>
                                
                                {/* Export Dropdown */}
                                <div className="relative" ref={exportRef}>
                                    <button onClick={() => setIsExportOpen(!isExportOpen)} className="px-5 py-2 bg-white border-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-all active:scale-95" style={{ color: theme.dark, borderColor: theme.dark }}>
                                        📥 ส่งออกข้อมูล <span className="text-[10px]">▼</span>
                                    </button>
                                    {isExportOpen && (
                                        <div className="absolute left-0 mt-2 w-48 bg-white border border-gray-200 rounded-xl shadow-xl z-[100] overflow-hidden">
                                            <button onClick={exportExcel} className="w-full text-left px-4 py-3 text-sm font-bold text-green-700 hover:bg-green-50 border-b flex items-center gap-2">
                                                📊 ไฟล์ Excel (.xlsx)
                                            </button>
                                            <button onClick={() => { setIsExportOpen(false); window.print(); }} className="w-full text-left px-4 py-3 text-sm font-bold text-red-700 hover:bg-red-50 flex items-center gap-2">
                                                📄 ไฟล์ PDF / พิมพ์
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                            
                            <div className="flex-1 max-w-md flex items-center gap-3 bg-white border px-4 py-2 rounded-xl shadow-sm" style={{ borderColor: theme.border }}>
                                <span>🔍</span>
                                <input type="text" placeholder="ค้นหา..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full outline-none text-sm" />
                            </div>
                        </div>

                        {/* Table Area */}
                        <div className="flex-1 overflow-auto custom-scrollbar border-2 rounded-xl table-container bg-white">
                            <table className="text-[13px]">
                                <thead className="sticky top-0 z-40">
                                    <tr style={{ backgroundColor: theme.header, color: theme.dark }}>
                                        <th rowSpan="2" className="w-[60px] text-center font-bold">ลำดับ</th>
                                        <th rowSpan="2" className="w-[100px] text-center font-bold">เขตตรวจราชการ</th>
                                        <th rowSpan="2" className="w-[180px] text-center font-bold">จังหวัด</th>
                                        <th colSpan="4" className="text-center font-bold">ร้อยละการใช้จ่าย (A)</th>
                                        <th colSpan="4" className="text-center font-bold">ร้อยละการชำระคืน (B)</th>
                                        <th colSpan="4" className="text-center font-bold">ร้อยละหนี้เกินกำหนด (C)</th>
                                        <th colSpan="2" className="text-center font-bold">รวม (D)</th>
                                        <th rowSpan="2" className="w-[150px] text-center font-bold">หมายเหตุ</th>
                                    </tr>
                                    <tr style={{ backgroundColor: theme.header, color: theme.dark }}>
                                        <th className="w-[110px] text-center font-bold">จำนวนที่ได้รับจัดสรร</th>
                                        <th className="w-[110px] text-center font-bold">ใช้จ่ายแล้ว</th>
                                        <th className="w-[70px] text-center font-bold">ร้อยละ</th>
                                        <th className="w-[70px] text-center font-bold bg-black/5">คะแนน(40)</th>
                                        <th className="w-[110px] text-center font-bold">เงินต้นครบกำหนดชำระ</th>
                                        <th className="w-[110px] text-center font-bold">รับชำระจริง</th>
                                        <th className="w-[70px] text-center font-bold">ร้อยละ</th>
                                        <th className="w-[70px] text-center font-bold bg-black/5">คะแนน(30)</th>
                                        <th className="w-[110px] text-center font-bold">หนี้คงเหลือต้นปีบัญชี</th>
                                        <th className="w-[110px] text-center font-bold">จำนวนหนี้เกินกำหนดชำระ</th>
                                        <th className="w-[70px] text-center font-bold">ร้อยละ</th>
                                        <th className="w-[70px] text-center font-bold bg-black/5">คะแนน(30)</th>
                                        <th className="w-[80px] text-center font-bold">คะแนน</th>
                                        <th className="w-[100px] text-center font-bold">ระดับ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {loading ? (
                                        <tr><td colSpan="18" className="p-20 text-center text-gray-400 font-bold animate-pulse">กำลังโหลด...</td></tr>
                                    ) : (
                                        data.slice(START_BODY_ROW).filter(row => {
                                            if (!searchQuery.trim()) return true;
                                            return row.some(c => String(c).toLowerCase().includes(searchQuery.toLowerCase()));
                                        }).map((row, rIdx) => {
                                            const isSummary = row[0] === "รวม";
                                            return (
                                                <tr key={rIdx} className={isSummary ? 'bg-gray-100 font-bold' : 'hover:bg-pink-50'}>
                                                    {isSummary ? (
                                                        <>
                                                            <td colSpan="3" className="border p-4 text-center bg-gray-200">รวมทั้งสิ้น</td>
                                                            {DISPLAY_COLS.slice(3).map(idx => (
                                                                <td key={idx} className="border p-2 text-center">{formatValue(row[idx], idx)}</td>
                                                            ))}
                                                        </>
                                                    ) : (
                                                        DISPLAY_COLS.map((colIdx, cIdx) => (
                                                            <td key={colIdx} className={`border p-2.5 ${cIdx >= 3 ? 'text-right' : 'text-left'} ${[7, 12, 17].includes(colIdx) ? 'bg-gray-50/50 font-bold' : ''}`}>
                                                                {formatValue(row[colIdx], colIdx)}
                                                            </td>
                                                        ))
                                                    )}
                                                </tr>
                                            );
                                        })
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
