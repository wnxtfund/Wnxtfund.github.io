<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDD Women Fund Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-pink: #E02B72; --light-pink-bg: #FFF0F5; --text-dark: #333333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background-color: var(--light-pink-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .dashboard-container {
            background: #ffffff; width: 100%; max-width: 900px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 40px; display: flex; flex-direction: column; align-items: center;
        }

        .header-section { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; margin-bottom: 40px; min-height: 80px; }
        .header-title-container { text-align: center; width: 100%; padding: 0 120px; }
        .main-title { color: var(--primary-pink); font-size: 32px; font-weight: 700; }
        .sub-title-eng { color: var(--primary-pink); font-size: 20px; font-weight: 600; margin-top: -5px; display: block; }
        .sub-title-th { color: #555; font-size: 13px; margin-top: 5px; }
        .logos-right { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; gap: 10px; }
        .logo-right-img { height: 50px; width: auto; }
        .btn-back-left { position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 6px; text-decoration: none; color: #666; font-size: 14px; font-weight: 600; background-color: #f4f4f6; padding: 8px 16px; border-radius: 50px; }

        /* --- วงกลมทึบดั้งเดิม 3 ส่วน --- */
        .menu-wheel-wrapper {
            position: relative; width: 450px; height: 450px; border-radius: 50%;
            background: conic-gradient(
                #FFF2D9 0deg 120deg,
                #E3F5FF 120deg 240deg,
                #E2F9F3 240deg 360deg
            );
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); margin: 20px 0;
        }

        .menu-slot { position: absolute; width: 150px; text-align: center; pointer-events: none; }
        .menu-link { display: inline-flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-dark); pointer-events: auto; transition: transform 0.2s ease; }
        .menu-link:hover { transform: scale(1.08); }

        .slot-orange { top: 75px; right: 75px; }
        .slot-blue   { bottom: 50px; left: 150px; }
        .slot-green  { top: 75px; left: 75px; }

        .menu-icon { width: 50px; height: 50px; margin-bottom: 8px; object-fit: contain; }
        .menu-title { font-size: 13px; font-weight: 700; color: #111111; line-height: 1.4; }

        .mobile-menu-list { display: none; }

        @media (max-width: 768px) {
            .header-section { flex-direction: column; gap: 15px; min-height: auto; margin-bottom: 25px; }
            .header-title-container { padding: 0; }
            .logos-right { position: relative; right: auto; top: auto; transform: none; order: -1; }
            .btn-back-left { position: relative; left: auto; top: auto; transform: none; margin-bottom: 10px; }
            
            .menu-wheel-wrapper { display: none; }
            .mobile-menu-list { display: flex; flex-direction: column; width: 100%; gap: 12px; }
            
            .mobile-card { display: flex; align-items: center; padding: 16px 20px; border-radius: 12px; text-decoration: none; color: var(--text-dark); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
            .card-orange { background-color: #FFF2D9; border-left: 5px solid #FF9800; }
            .card-blue   { background-color: #E3F5FF; border-left: 5px solid #2196F3; }
            .card-green  { background-color: #E2F9F3; border-left: 5px solid #4CAF50; }
            
            .mobile-card .m-icon { width: 36px; height: 36px; margin-right: 15px; object-fit: contain; }
            .mobile-card .m-title { font-size: 14px; font-weight: 700; color: #111111; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="header-section">
            <a href="index_a1.html" class="btn-back-left">ย้อนกลับ</a>
            <div class="header-title-container">
                <h1 class="main-title">CDD Women Fund</h1>
                <span class="sub-title-eng">— Dashboard —</span>
                <p class="sub-title-th">เครื่องมือสนับสนุนการดำเนินงาน</p>
            </div>
            <div class="logos-right">
                <img class="logo-right-img" src="img/cdd.png" alt="Gov Logo 1">
                <img class="logo-right-img" src="img/logo.png" alt="Gov Logo 2">
            </div>
        </header>

        <!-- Desktop Wheel -->
        <div class="menu-wheel-wrapper">
            <div class="menu-slot slot-orange">
                <a href="" class="menu-link">
                    <img class="menu-icon" src="img/q-and-a.png" alt="Icon">
                    <div class="menu-title">ถาม-ตอบ</div>
                </a>
            </div>
            <div class="menu-slot slot-blue">
                <a href="" class="menu-link">
                    <img class="menu-icon" src="img/list.png" alt="Icon">
                    <div class="menu-title">มาตรการบริหารหนี้</div>
                </a>
            </div>
            <div class="menu-slot slot-green">
                <a href="" class="menu-link">
                    <img class="menu-icon" src="img/budget.png" alt="Icon">
                    <div class="menu-title">คำนวณดอกเบี้ย</div>
                </a>
            </div>
        </div>

        <!-- Mobile List -->
        <div class="mobile-menu-list">
            <a href="" class="mobile-card card-orange">
                <img class="m-icon" src="img/q-and-a.png" alt="Icon">
                <div class="m-title">ถาม-ตอบ ปัญหาการดำเนินงาน</div>
            </a>
            <a href="" class="mobile-card card-blue">
                <img class="m-icon" src="img/list.png" alt="Icon">
                <div class="m-title">มาตรการบริหารจัดการหนี้</div>
            </a>
            <a href="" class="mobile-card card-green">
                <img class="m-icon" src="img/budget.png" alt="Icon">
                <div class="m-title">ระบบคำนวณดอกเบี้ยผิดนัด</div>
            </a>
        </div>
    </div>

</body>
</html>
