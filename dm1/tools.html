<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDD Women Fund Dashboard (3 Items)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #E02B72;
            --light-pink-bg: #FFF0F5;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--light-pink-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            background: #ffffff;
            width: 100%;
            max-width: 900px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            position: relative;
        }

        .header-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            min-height: 80px;
        }

        .header-title-container {
            text-align: center;
            width: 100%;
            padding: 0 120px;
        }

        .main-title {
            color: var(--primary-pink);
            font-size: 32px;
            font-weight: 700;
        }

        .sub-title-eng {
            color: var(--primary-pink);
            font-size: 20px;
            font-weight: 600;
            margin-top: -5px;
            display: block;
        }

        .sub-title-th {
            color: #555;
            font-size: 13px;
            margin-top: 5px;
        }

        .logos-right {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .logo-right-img {
            height: 50px;
            width: auto;
        }

        /* --- โครงสร้างวงล้อ 3 ส่วนแบบสมมาตรพิกัดตรงจุด --- */
        .menu-wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
            aspect-ratio: 1 / 1;
        }

        /* แผ่นพายเฉลี่ยแผ่สีชิ้นละ 120 องศาเต็มวงพอดี */
        .donut-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #FFF2D9 0deg 120deg,
                #E3F5FF 120deg 240deg,
                #E2F9F3 240deg 360deg
            );
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        }

        .menu-item {
            position: absolute;
            width: 220px; /* ขยายบล็อกข้อความให้กว้างเต็มแผ่นพาย */
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.2s ease;
            z-index: 2;
        }

        /* ดึงสัดส่วนพิกัดให้ปุ่มไปลอยเด่นอยู่กึ่งกลางสามเหลี่ยมของแต่ละชิ้น */
        .item-orange { top: 18%; left: 52%; } /* ชิ้นขวาบน */
        .item-blue   { top: 55%; left: 28%; } /* ชิ้นล่างกลาง */
        .item-green  { top: 18%; left: 4%; }  /* ชิ้นซ้ายบน */

        .menu-item:hover {
            transform: scale(1.06);
        }

        .menu-icon {
            width: 52px;
            height: 52px;
            margin-bottom: 12px;
            object-fit: contain;
            background: #ffffff;
            padding: 9px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .menu-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.4;
            color: #111111;
        }

        .menu-desc {
            font-size: 11.5px;
            color: #444444;
            line-height: 1.4;
        }

        /* ปุ่มย้อนกลับด้านซ้ายบน (Back Button) */
        .btn-back-left {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #666666;
            font-size: 15px;
            font-weight: 600;
            background-color: #f5f5f7;
            padding: 10px 18px;
            border-radius: 50px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
            z-index: 10;
        }

        .btn-back-left:hover {
            background-color: var(--primary-pink);
            color: #ffffff;
            transform: translateY(-50%) translateX(-3px);
            box-shadow: 0 4px 10px rgba(224, 43, 114, 0.2);
        }

        .btn-back-left svg {
            fill: currentColor;
            transition: transform 0.2s ease;
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 650px) {
            .header-section { flex-direction: column; gap: 10px; min-height: auto; }
            .header-title-container { padding: 0; }
            .logos-right { position: relative; right: auto; top: auto; transform: none; order: -1; margin-bottom: 5px; }
            .main-title { font-size: 26px; }
            .sub-title-eng { font-size: 18px; }
            
            .menu-wheel-wrapper { display: flex; flex-direction: column; height: auto; gap: 15px; margin: 20px auto; }
            .donut-ring { display: none; }
            .menu-item { position: relative; width: 100%; top: auto !important; left: auto !important; flex-direction: row; text-align: left; padding: 15px 20px; border-radius: 16px; gap: 15px; }
            .item-orange { background-color: #FFF2D9; }
            .item-blue   { background-color: #E3F5FF; }
            .item-green  { background-color: #E2F9F3; }
            .menu-icon { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="header-section">

            <a href="index.html" class="btn-back-left">
                <svg width="16" height="16" viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                ย้อนกลับ
            </a>

            <div class="header-title-container">
                <h1 class="main-title">CDD Women Fund</h1>
                <span class="sub-title-eng">— Dashboard —</span>
                <p class="sub-title-th">เครื่องมือบริหารจัดการหนี้</p>
            </div>
            <div class="logos-right">
                <img class="logo-right-img" src="img/cdd.png" alt="Gov Logo 1">
                <img class="logo-right-img" src="img/logo.png" alt="Gov Logo 2">
            </div>
        </header>

        <div class="menu-wheel-wrapper">
            <div class="donut-ring"></div>

            <a href="" class="menu-item item-orange">
                <img class="menu-icon" src="img/q-and-a.png" alt="Icon">
                <div class="menu-title">ถาม-ตอบ</div>
                <div class="menu-desc">ถาม - ตอบ ปัญหา<br>เกี่ยวกับการดำเนินงาน</div>
            </a>

            <a href="" class="menu-item item-blue">
                <img class="menu-icon" src="img/list.png" alt="Icon">
                <div class="menu-title">มาตรการบริหารจัดการหนี้</div>
                <div class="menu-desc">มาตรการบริหารจัดการหนี้<br>สำหรับสำนักงานกองทุนฯ</div>
            </a>

            <a href="" class="menu-item item-green">
                <img class="menu-icon" src="img/budget.png" alt="Icon">
                <div class="menu-title">โปรแกรมคำนวน<br>ดอกเบี้ยผิดนัด</div>
                <div class="menu-desc">โปรแกรมระบบช่วยสำหรับ<br>คำนวนดอกเบี้ยผิดนัด</div>
            </a>
        </div>
    </div>

</body>
</html>
