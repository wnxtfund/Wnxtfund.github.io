<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDD Women Fund Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #E02B72;
            --light-pink-bg: #FFF0F5;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--light-pink-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            background: #ffffff;
            width: 100%;
            max-width: 900px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            position: relative;
        }

        /* --- 1. ส่วนหัว (Header) จัดกึ่งกลางสมบูรณ์ --- */
        .header-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            min-height: 80px;
        }

        .header-title-container {
            text-align: center;
            width: 100%;
            padding: 0 120px;
        }

        .main-title {
            color: var(--primary-pink);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sub-title-eng {
            color: var(--primary-pink);
            font-size: 20px;
            font-weight: 600;
            margin-top: -5px;
            display: block;
        }

        .sub-title-th {
            color: #555;
            font-size: 13px;
            margin-top: 5px;
        }

        .logos-right {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .logo-right-img {
            height: 50px;
            width: auto;
        }

        /* --- 2. โครงสร้างเมนูวงกลมแบบ 3 ส่วน (3-Item Pie Menu Wheel) --- */
        .menu-wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
            aspect-ratio: 1 / 1;
            display: grid;
            place-items: center;
        }

        .donut-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: grid;
            grid-template-areas: "layer";
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        }

        .menu-item {
            grid-area: layer;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: var(--text-dark);
            
            /* ตัดแผ่นพายให้เป็นมุม 120 องศา (พุ่งจากจุดกึ่งกลาง 50% 50%) */
            clip-path: polygon(50% 50%, 0% 0%, 100% 0%, 100% 21.13%); 
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 45px; /* ปรับระดับเนื้อหาให้อยู่กลางแผ่นพายที่กว้างขึ้น */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .menu-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 200px; /* ขยายพื้นที่วางตัวอักษรเล็กน้อยตามความกว้างของแผ่นพาย */
        }

        .menu-icon {
            width: 52px;
            height: 52px;
            margin-bottom: 12px;
            object-fit: contain;
            background: #ffffff;
            padding: 9px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .menu-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .menu-desc {
            font-size: 11px;
            color: #555;
            line-height: 1.4;
        }

        /* คำนวณองศาจัดวาง 3 ทิศทาง (ชิ้นละ 120 องศา) 
           พร้อมหมุนข้อความกลับมาเป็นแนวตั้งตรง (ปรับแกนตามสัดส่วนองศาใหม่)
        */
        /* ชิ้นที่ 1: งานปี 2568 (หมุนเริ่มที่ 0 องศา เพื่อให้อยู่ด้านบนเฉียงขวา) */
        .item-orange {
            background-color: #FFF2D9;
            transform: rotate(0deg);
        }
        .item-orange .menu-content { transform: rotate(0deg) translateY(0); }

        /* ชิ้นที่ 2: งานปี 2569 (หมุนไป 120 องศา) */
        .item-blue {
            background-color: #E3F5FF;
            transform: rotate(120deg);
        }
        .item-blue .menu-content { transform: rotate(-120deg) translateY(0); }

        /* ชิ้นที่ 3: เครื่องมือบริหารจัดการหนี้ (หมุนไป 240 องศา) */
        .item-green {
            background-color: #E2F9F3;
            transform: rotate(240deg);
        }
        .item-green .menu-content { transform: rotate(-240deg) translateY(0); }


        /* Hover Effects: ยื่นตัวออกจากศูนย์กลางตามมุมเฉียง 120 องศาของตัวเอง */
        .item-orange:hover { transform: rotate(0deg)   translateY(-15px); z-index: 5; }
        .item-blue:hover   { transform: rotate(120deg) translateY(-15px); z-index: 5; }
        .item-green:hover  { transform: rotate(240deg) translateY(-15px); z-index: 5; }


        /* Responsive: บนหน้าจอมือถือจะคลี่ออกมาเรียงเป็นแถวแนวตั้งอ่านง่ายอัตโนมัติ */
        @media (max-width: 650px) {
            .header-section {
                flex-direction: column;
                gap: 10px;
                min-height: auto;
            }
            .header-title-container {
                padding: 0;
            }
            .logos-right {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                order: -1;
                margin-bottom: 5px;
            }
            .main-title { font-size: 26px; }
            .sub-title-eng { font-size: 18px; }
            
            .menu-wheel-wrapper {
                display: flex;
                flex-direction: column;
                height: auto;
                gap: 15px;
                margin: 20px auto;
            }
            .donut-ring {
                display: flex;
                flex-direction: column;
                position: relative;
                gap: 12px;
                overflow: visible;
                box-shadow: none;
            }
            .menu-item {
                position: relative;
                width: 100%;
                height: auto;
                border-radius: 16px !important;
                clip-path: none !important;
                transform: none !important;
                padding: 15px 20px;
            }
            .menu-item:hover {
                transform: translateY(-3px) !important;
            }
            .menu-content {
                flex-direction: row;
                text-align: left;
                width: 100%;
                gap: 15px;
                transform: none !important;
            }
            .menu-icon { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <header class="header-section">
            <div class="header-title-container">
                <h1 class="main-title">CDD Women Fund</h1>
                <span class="sub-title-eng">— Dashboard —</span>
                <p class="sub-title-th">ผลการดำเนินงานปี 2568</p>
            </div>
            
            <div class="logos-right">
                <img class="logo-right-img" src="img/cdd.png" alt="Gov Logo 1">
                <img class="logo-right-img" src="img/logo.png" alt="Gov Logo 2">
            </div>
        </header>

        <div class="menu-wheel-wrapper">
            <div class="donut-ring">

                <a href="" class="menu-item item-orange">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/moneybag.png" alt="Icon">
                        <div class="menu-title">ถาม-ตอบ</div>
                        <div class="menu-desc">ถาม - ตอบ ปัญหา<br>เกี่ยวกับการดำเนินงาน</div>
                    </div>
                </a>

                <a href="" class="menu-item item-blue">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/chat.png" alt="Icon">
                        <div class="menu-title">มาตรการบริหารจัดการหนี้</div>
                        <div class="menu-desc">มาตรการบริหารจัดการหนี้<br>สำหรับสำนักงานกองทุนพัฒนาบทบาทสตรี</div>
                    </div>
                </a>

                <a href="" class="menu-item item-green">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/checklist.png" alt="Icon">
                        <div class="menu-title">โปรแกรมคำนวนดอกเบี้ยผิดนัด</div>
                        <div class="menu-desc">โปรแกรมสำหรับคำนวนดอกเบี้ยผิดนัด</div>
                    </div>
                </a>

            </div>
        </div>

    </div>

</body>
</html>
