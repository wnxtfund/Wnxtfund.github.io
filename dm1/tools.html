<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDD Women Fund Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #E02B72;
            --light-pink-bg: #FFF0F5;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--light-pink-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            background: #ffffff;
            width: 100%;
            max-width: 900px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            position: relative;
        }

        /* --- 1. ส่วนหัว (Header) --- */
        .header-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            min-height: 80px;
        }

        .header-title-container {
            text-align: center;
            width: 100%;
            padding: 0 120px;
        }

        .main-title {
            color: var(--primary-pink);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sub-title-eng {
            color: var(--primary-pink);
            font-size: 20px;
            font-weight: 600;
            margin-top: -5px;
            display: block;
        }

        .sub-title-th {
            color: #555;
            font-size: 13px;
            margin-top: 5px;
        }

        .logos-right {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .logo-right-img {
            height: 50px;
            width: auto;
        }

        /* --- 2. โครงสร้างวงกลม 3 ส่วนปรับปรุงใหม่ (แกนสมมาตร $120^\circ$) --- */
        .menu-wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
            aspect-ratio: 1 / 1;
            display: grid;
            place-items: center;
        }

        .donut-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: grid;
            grid-template-areas: "layer";
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        }

        .menu-item {
            grid-area: layer;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: var(--text-dark);
            
            /* ใช้คลิปพาทแบบตั้งฉากจุดศูนย์กลางร่วมเพื่อสร้างแผ่นพายมุมกว้าง 120 องศาที่ได้สมดุล */
            clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 78.87% 100%);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 55px; /* ดันเนื้อหาเข้าไปในส่วนที่กว้างที่สุดของแผ่นพาย */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .menu-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 180px; /* ขยายพื้นที่หน้ากว้างข้อความเพื่อรองรับประโยคยาวๆ ไม่ให้ล้นตกขอบ */
        }

        .menu-icon {
            width: 52px;
            height: 52px;
            margin-bottom: 12px;
            object-fit: contain;
            background: #ffffff;
            padding: 9px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .menu-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.4;
            color: #111111;
        }

        .menu-desc {
            font-size: 11.5px;
            color: #444444;
            line-height: 1.4;
        }

        /* คำนวณมุมการกระจายแผ่นพาย 3 ทิศทาง ทิศทางละ 120 องศา 
           พร้อมดึงกลุ่มคอนเทนต์กลับมาตั้งระนาบแนวตรงปกติ (-60deg จากเซ็นเตอร์บล็อก) 
           ทำให้ข้อความทุกชิ้นสมมาตรอยู่ตรงกลางแผ่นพายพอดี ไม่เอียง ไม่เบี้ยว
        */
        
        /* ชิ้นที่ 1: ถาม-ตอบ (ด้านขวาบน) */
        .item-orange { 
            background-color: #FFF2D9; 
            transform: rotate(0deg); 
        }
        .item-orange .menu-content { 
            transform: rotate(60deg) translate(35px, 0px); 
        }

        /* ชิ้นที่ 2: มาตรการบริหารจัดการหนี้ (ด้านล่าง) */
        .item-blue { 
            background-color: #E3F5FF; 
            transform: rotate(120deg); 
        }
        .item-blue .menu-content { 
            transform: rotate(-60deg) translate(0px, 35px); 
        }

        /* ชิ้นที่ 3: โปรแกรมคำนวนดอกเบี้ยผิดนัด (ด้านซ้ายบน) */
        .item-green { 
            background-color: #E2F9F3; 
            transform: rotate(240deg); 
        }
        .item-green .menu-content { 
            transform: rotate(-180deg) translate(-35px, 0px); 
        }


        /* Hover Effects: แผ่นพายขยายตัวดันนูนออกตามมุมเฉียงประจักษ์สายตาของตนเอง */
        .item-orange:hover { transform: rotate(0deg)   translateY(-12px); z-index: 5; }
        .item-blue:hover   { transform: rotate(120deg) translateY(-12px); z-index: 5; }
        .item-green:hover  { transform: rotate(240deg) translateY(-12px); z-index: 5; }


        /* Responsive สำหรับมือถือ: คลี่การซ้อนทับออกมาเป็นแถวเรียงเดี่ยวแนวตั้งเปิดอ่านง่าย */
        @media (max-width: 650px) {
            .header-section {
                flex-direction: column;
                gap: 10px;
                min-height: auto;
            }
            .header-title-container { padding: 0; }
            .logos-right {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                order: -1;
                margin-bottom: 5px;
            }
            .main-title { font-size: 26px; }
            .sub-title-eng { font-size: 18px; }
            
            .menu-wheel-wrapper {
                display: flex;
                flex-direction: column;
                height: auto;
                gap: 15px;
                margin: 20px auto;
            }
            .donut-ring {
                display: flex;
                flex-direction: column;
                position: relative;
                gap: 12px;
                overflow: visible;
                box-shadow: none;
            }
            .menu-item {
                position: relative;
                width: 100%;
                height: auto;
                border-radius: 16px !important;
                clip-path: none !important;
                transform: none !important;
                padding: 15px 20px;
            }
            .menu-item:hover {
                transform: translateY(-3px) !important;
            }
            .menu-content {
                flex-direction: row;
                text-align: left;
                width: 100%;
                gap: 15px;
                transform: none !important;
            }
            .menu-icon { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <header class="header-section">
            <div class="header-title-container">
                <h1 class="main-title">CDD Women Fund</h1>
                <span class="sub-title-eng">— Dashboard —</span>
                <p class="sub-title-th">ผลการดำเนินงานปี 2568</p>
            </div>
            
            <div class="logos-right">
                <img class="logo-right-img" src="img/cdd.png" alt="Gov Logo 1">
                <img class="logo-right-img" src="img/logo.png" alt="Gov Logo 2">
            </div>
        </header>

        <div class="menu-wheel-wrapper">
            <div class="donut-ring">

                <a href="" class="menu-item item-orange">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/moneybag.png" alt="Icon">
                        <div class="menu-title">ถาม-ตอบ</div>
                        <div class="menu-desc">ถาม - ตอบ ปัญหา<br>เกี่ยวกับการดำเนินงาน</div>
                    </div>
                </a>

                <a href="" class="menu-item item-blue">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/chat.png" alt="Icon">
                        <div class="menu-title">มาตรการบริหารจัดการหนี้</div>
                        <div class="menu-desc">มาตรการบริหารจัดการหนี้<br>สำหรับสำนักงานกองทุนฯ</div>
                    </div>
                </a>

                <a href="" class="menu-item item-green">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/checklist.png" alt="Icon">
                        <div class="menu-title">โปรแกรมคำนวน<br>ดอกเบี้ยผิดนัด</div>
                        <div class="menu-desc">โปรแกรมระบบช่วยสำหรับ<br>คำนวนดอกเบี้ยผิดนัด</div>
                    </div>
                </a>

            </div>
        </div>

    </div>

</body>
</html>
