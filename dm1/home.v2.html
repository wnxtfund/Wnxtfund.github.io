<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDD Women Fund Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #E02B72;
            --light-pink-bg: #FFF0F5;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--light-pink-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            background: #ffffff;
            width: 100%;
            max-width: 900px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            position: relative;
        }

        /* --- 1. ส่วนหัว (Header) ปรับปรุงให้จัดกึ่งกลางสมบูรณ์ --- */
        .header-section {
            position: relative; /* สร้างกรอบอ้างอิงตำแหน่งให้โลโก้ */
            display: flex;
            justify-content: center; /* บังคับให้ไอเทมหลักอยู่ตรงกลาง */
            align-items: center;
            margin-bottom: 35px;
            min-height: 80px; /* คุมความสูงขั้นต่ำป้องกันการขยับ */
        }

        .header-title-container {
            text-align: center;
            width: 100%; /* ให้พื้นที่ขยายเต็มเพื่อจัดจุด Center */
            padding: 0 120px; /* เว้นระยะด้านข้างไว้เพื่อไม่ให้ข้อความยาวๆ ไปซ้อนกับโลโก้ */
        }

        .main-title {
            color: var(--primary-pink);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sub-title-eng {
            color: var(--primary-pink);
            font-size: 20px;
            font-weight: 600;
            margin-top: -5px;
            display: block;
        }

        .sub-title-th {
            color: #555;
            font-size: 13px;
            margin-top: 5px;
        }

        /* ดึงโลโก้ออกมาลอยทางขวา ไม่ให้แย่งพื้นที่และเบียดจุดศูนย์กลาง */
        .logos-right {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .logo-right-img {
            height: 50px;
            width: auto;
        }

        /* --- 2. โครงสร้างเมนูวงกลมแบบเต็มแผ่น 4 ส่วน --- */
        .menu-wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
            aspect-ratio: 1 / 1;
            display: grid;
            place-items: center;
        }

        .donut-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: grid;
            grid-template-areas: "layer";
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        }

        .menu-item {
            grid-area: layer;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: var(--text-dark);
            clip-path: polygon(50% 50%, 0% 0%, 100% 0%); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 55px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .menu-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 190px;
        }

        .menu-icon {
            width: 52px;
            height: 52px;
            margin-bottom: 12px;
            object-fit: contain;
            background: #ffffff;
            padding: 9px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .menu-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .menu-desc {
            font-size: 11px;
            color: #555;
            line-height: 1.4;
        }

        /* จัดมุมเฉียงกากบาท 4 ทิศทาง */
        .item-orange { background-color: #FFF2D9; transform: rotate(45deg); }
        .item-orange .menu-content { transform: rotate(-45deg) translateY(-5px); }

        .item-blue { background-color: #E3F5FF; transform: rotate(135deg); }
        .item-blue .menu-content { transform: rotate(-135deg) translateY(-5px); }

        .item-green { background-color: #E2F9F3; transform: rotate(225deg); }
        .item-green .menu-content { transform: rotate(-225deg) translateY(-5px); }

        .item-pink { background-color: #FFE6EE; transform: rotate(315deg); }
        .item-pink .menu-content { transform: rotate(-315deg) translateY(-5px); }

        /* Hover Effects */
        .item-orange:hover { transform: rotate(45deg)  translateY(-15px); z-index: 5; }
        .item-blue:hover   { transform: rotate(135deg) translateY(-15px); z-index: 5; }
        .item-green:hover  { transform: rotate(225deg) translateY(-15px); z-index: 5; }
        .item-pink:hover   { transform: rotate(315deg) translateY(-15px); z-index: 5; }

        /* --- 3. แถบปุ่มด้านล่าง (Footer Button) --- */
        .footer-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, #E02B72 0%, #F6418C 100%);
            color: white;
            padding: 16px 30px;
            border-radius: 18px;
            text-decoration: none;
            max-width: 750px;
            margin: 25px auto 0 auto;
            box-shadow: 0 8px 20px rgba(224, 43, 114, 0.2);
            transition: transform 0.2s, opacity 0.2s;
        }

        .footer-button:hover {
            opacity: 0.95;
            transform: translateY(-2px);
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .footer-icon { width: 35px; height: 35px; }
        .footer-text h3 { font-size: 16px; font-weight: 600; }
        .footer-text p { font-size: 12px; opacity: 0.9; }
        .footer-arrow { font-size: 20px; font-weight: bold; }

        /* Responsive: จัดการการแสดงผลบนสมาร์ทโฟน */
        @media (max-width: 650px) {
            .header-section {
                flex-direction: column;
                gap: 10px;
                min-height: auto;
            }
            .header-title-container {
                padding: 0; /* คืนค่าพื้นที่บนหน้าจอเล็ก */
            }
            .logos-right {
                position: relative; /* ปลดลอยกลับมาจัดแถวปกติบนมือถือ */
                right: auto;
                top: auto;
                transform: none;
                order: -1; /* นำโลโก้ขึ้นไปอยู่ด้านบนหัวข้อ */
                margin-bottom: 5px;
            }
            .main-title { font-size: 26px; }
            .sub-title-eng { font-size: 18px; }
            
            .menu-wheel-wrapper {
                display: flex;
                flex-direction: column;
                height: auto;
                gap: 15px;
                margin: 20px auto;
            }
            .donut-ring {
                display: flex;
                flex-direction: column;
                position: relative;
                gap: 12px;
                overflow: visible;
                box-shadow: none;
            }
            .menu-item {
                position: relative;
                width: 100%;
                height: auto;
                border-radius: 16px !important;
                clip-path: none !important;
                transform: none !important;
                padding: 15px 20px;
            }
            .menu-item:hover {
                transform: translateY(-3px) !important;
            }
            .menu-content {
                flex-direction: row;
                text-align: left;
                width: 100%;
                gap: 15px;
                transform: none !important;
            }
            .menu-icon { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <header class="header-section">
            <div class="header-title-container">
                <h1 class="main-title">CDD Women Fund</h1>
                <span class="sub-title-eng">— Dashboard —</span>
                <p class="sub-title-th">ฐานข้อมูล ระดับประเทศ รายจังหวัด ลูกหนี้กองทุนพัฒนาบทบาทสตรีระดับประเทศ</p>
            </div>
            
            <div class="logos-right">
                <img class="logo-right-img" src="img/cdd.png" alt="Gov Logo 1">
                <img class="logo-right-img" src="img/logo.png" alt="Gov Logo 2">
            </div>
        </header>

        <div class="menu-wheel-wrapper">
            <div class="donut-ring">

                <a href="finance_debtors.html" class="menu-item item-orange">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/moneybag.png" alt="Icon">
                        <div class="menu-title">งานปี 2568</div>
                        <div class="menu-desc">ผลการดำเนินงาน<br>ในปี 2568</div>
                    </div>
                </a>

                <a href="" class="menu-item item-blue">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/chat.png" alt="Icon">
                        <div class="menu-title">งานปี 2569</div>
                        <div class="menu-desc">ผลการดำเนินงาน<br>ในปี2569</div>
                    </div>
                </a>

                <a href="" class="menu-item item-green">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/checklist.png" alt="Icon">
                        <div class="menu-title">เครื่องมือบริหารจัดการหนี้</div>
                        <div class="menu-desc">มาตรการ แนวทาง<br>และเครื่องมือบริหารจัดการหนี้</div>
                    </div>
                </a>

                <a href="" class="menu-item item-pink">
                    <div class="menu-content">
                        <img class="menu-icon" src="img/arrow.png" alt="Icon">
                        <div class="menu-title">Dashboard</div>
                        <div class="menu-desc">Dashboard สำหรับแสดงผล</div>
                    </div>
                </a>

            </div>
        </div>

        <!-- <a href="" class="footer-button">
            <div class="footer-left">
                <img class="footer-icon" src="img/perm.png" alt="Dashboard Icon">
                <div class="footer-text">
                    <h3>CDDWomen Dashboard</h3>
                    <p>Dashboard สำหรับผู้บริหาร</p>
                </div>
            </div>
            <div class="footer-arrow">❯</div>
        </a> -->

    </div>

</body>
</html>
