    <script>
        function show_loader() {
            $(".loader-div").show();
        }

        document.onkeydown = function(e) {
            var keycode = e ? e.which : window.event.keyCode;
            if (keycode == 13) return false; // ป้องกัน Enter submit
        };

        function CheckMember13(condition_value, change_select_id) {
            var error_id13 = 0;

            if (condition_value.length != 13) {
                alert('รหัสประชาชนไม่ครบ 13 หลักค่ะ');
                error_id13++;
                document.getElementById(change_select_id).value = '';
                document.getElementById(change_select_id).focus();
                return;
            }

            // ตรวจ checksum รหัสประชาชน
            var sum = 0;
            for (var i = 0; i < 12; i++) {
                sum += parseInt(condition_value.charAt(i)) * (13 - i);
            }
            if ((11 - sum % 11) % 10 != parseInt(condition_value.charAt(12))) {
                alert('รหัสประชาชนไม่ถูกต้องค่ะ');
                error_id13++;
                document.getElementById(change_select_id).value = '';
                document.getElementById(change_select_id).focus();
                return;
            }

            if (error_id13 == 0) {
                $.ajax({
                    url: "chk_id2_A.php",
                    type: "POST",
                    data: { chkid: condition_value },
                    dataType: "text",
                    async: false,
                    success: function(data) {
                        var result = data.split(",");
                        var data01 = result[0];

                        if (!data01 || data01.length >= 10) {
                            document.regisform.Title.value = '';
                            document.getElementById('btnSend').style.display = 'none';
                            alert('ไม่พบ token สำหรับตรวจสอบ');
                            return;
                        }

                        document.regisform.Title.value = data01;
                        document.getElementById('btnSend').style.display = 'block';

                        document.regisform.Fname.value = result[1] || '';
                        document.regisform.Lname.value = result[2] || '';
                        document.regisform.BIRTHDAY.value = result[3] || '';
                        document.regisform.Age.value = result[4] || '';
                        document.regisform.SexN.value = result[5] || '';
                        document.regisform.SexC.value = result[6] || '';
                        document.regisform.StatusPer.value = result[7] || '';
                        document.regisform.StatusPerCode.value = result[8] || '';
                        document.regisform.houseNo.value = result[9] || '';
                        document.regisform.villageNo.value = result[10] || '';
                        document.regisform.roadDesc.value = result[11] || '';
                        document.regisform.alleyDesc.value = result[12] || '';
                        document.regisform.subdistrictDesc.value = result[13] || '';
                        document.regisform.districtDesc.value = result[14] || '';
                        document.regisform.provinceDesc.value = result[15] || '';
                        document.regisform.rcodeDesc.value = result[16] || '';
                        document.regisform.houseTypeDesc.value = result[17] || '';
                    },
                    error: function(xhr, status, error) {
                        console.log(xhr.responseText);
                        alert('เกิดข้อผิดพลาด\nStatus: ' + status + '\nError: ' + error);
                    }
                });
            }
        }
    </script>
