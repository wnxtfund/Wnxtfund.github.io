<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDD Women Fund Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #E02B72;
            --light-pink-bg: #FFF0F5;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--light-pink-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            background: #ffffff;
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header --- */
        .header-section {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            min-height: 80px;
        }

        .header-title-container {
            text-align: center;
            width: 100%;
            padding: 0 120px;
        }

        .main-title {
            color: var(--primary-pink);
            font-size: 32px;
            font-weight: 700;
        }

        .sub-title-eng {
            color: var(--primary-pink);
            font-size: 20px;
            font-weight: 600;
            margin-top: -5px;
            display: block;
        }

        .sub-title-th {
            color: #555;
            font-size: 13px;
            margin-top: 5px;
        }

        .logos-right {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .logo-right-img {
            height: 50px;
            width: auto;
        }

        /* --- รูปแบบวงกลมดั้งเดิม (Desktop เฉพาะคอมพิวเตอร์) --- */
        .menu-wheel-wrapper {
            position: relative;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            /* แบ่งพื้นที่เป็น 4 ส่วนเท่ากันแบบดั้งเดิม (ไม่มีรูตรงกลาง) */
            background: conic-gradient(
                #FFE6EE 0deg 90deg,
                #FFF2D9 90deg 180deg,
                #E3F5FF 180deg 270deg,
                #E2F9F3 270deg 360deg
            );
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin: 20px 0;
        }

        /* จัดพิกัดกล่องเนื้อหาภายในวงกลม */
        .menu-slot {
            position: absolute;
            width: 160px;
            text-align: center;
            pointer-events: none; /* ปล่อยให้คลิกทะลุไปโดนลิงก์ข้างใน */
        }

        /* ลิงก์เฉพาะตัวหนังสือและไอคอน */
        .menu-link {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-dark);
            pointer-events: auto; /* เปิดให้คลิกได้เฉพาะตัวโครงสร้างลิงก์ */
            transition: transform 0.2s ease;
        }

        .menu-link:hover {
            transform: scale(1.08);
        }

        .slot-pink   { top: 55px; left: 55px; }
        .slot-orange { top: 55px; right: 55px; }
        .slot-blue   { bottom: 55px; right: 55px; }
        .slot-green  { bottom: 55px; left: 55px; }

        .menu-icon {
            width: 50px;
            height: 50px;
            margin-bottom: 8px;
            object-fit: contain;
        }

        .menu-title {
            font-size: 14px;
            font-weight: 700;
            color: #111111;
            line-height: 1.4;
        }

        /* ซ่อนเมนูเวอร์ชันมือถือในหน้าจอคอม */
        .mobile-menu-list {
            display: none;
        }

        /* --- RESPONSIVE: ปรับเป็นสี่เหลี่ยมในมือถือ --- */
        @media (max-width: 768px) {
            .header-section {
                flex-direction: column;
                gap: 15px;
                min-height: auto;
                margin-bottom: 25px;
            }
            .header-title-container { padding: 0; }
            .logos-right {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                order: -1;
            }

            /* ซ่อนรูปแบบวงกลมบนมือถือ */
            .menu-wheel-wrapper {
                display: none;
            }

            /* เปิดใช้งานเมนูสี่เหลี่ยมเรียงลงมาสำหรับมือถือ */
            .mobile-menu-list {
                display: flex;
                flex-direction: column;
                width: 100%;
                gap: 12px;
                margin-top: 10px;
            }

            .mobile-card {
                display: flex;
                align-items: center;
                padding: 16px 20px;
                border-radius: 12px;
                text-decoration: none;
                color: var(--text-dark);
                box-shadow: 0 4px 10px rgba(0,0,0,0.03);
                transition: transform 0.2s ease;
            }

            /* สีพื้นหลังสี่เหลี่ยมตามโซนสีเดิม */
            .card-pink   { background-color: #FFE6EE; border-left: 5px solid #E02B72; }
            .card-orange { background-color: #FFF2D9; border-left: 5px solid #FF9800; }
            .card-blue   { background-color: #E3F5FF; border-left: 5px solid #2196F3; }
            .card-green  { background-color: #E2F9F3; border-left: 5px solid #4CAF50; }

            .mobile-card .m-icon {
                width: 36px;
                height: 36px;
                margin-right: 15px;
                object-fit: contain;
            }

            .mobile-card .m-title {
                font-size: 15px;
                font-weight: 700;
                color: #111111;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <header class="header-section">
            <div class="header-title-container">
                <h1 class="main-title">CDD Women Fund</h1>
                <span class="sub-title-eng">— Dashboard —</span>
                <p class="sub-title-th">ฐานข้อมูล กองทุนพัฒนาบทบาทสตรีระดับประเทศ</p>
            </div>
            
            <div class="logos-right">
                <img class="logo-right-img" src="img/cdd.png" alt="Gov Logo 1">
                <img class="logo-right-img" src="img/logo.png" alt="Gov Logo 2">
            </div>
        </header>

        <div class="menu-wheel-wrapper">
            <div class="menu-slot slot-pink">
                <a href="dashboard.html" class="menu-link">
                    <img class="menu-icon" src="img/data-analysis.png" alt="Icon">
                    <div class="menu-title">ผลการดำเนินงาน<br>& Dashboard</div>
                </a>
            </div>

            <div class="menu-slot slot-orange">
                <a href="indicators.html" class="menu-link">
                    <img class="menu-icon" src="img/moneybag.png" alt="Icon">
                    <div class="menu-title">ตัวชี้วัดและ<br>การประเมินผล</div>
                </a>
            </div>

            <div class="menu-slot slot-blue">
                <a href="debt.html" class="menu-link">
                    <img class="menu-icon" src="img/chat.png" alt="Icon">
                    <div class="menu-title">การบริหาร<br>เงินทุนและหนี้</div>
                </a>
            </div>

            <div class="menu-slot slot-green">
                <a href="tools.html" class="menu-link">
                    <img class="menu-icon" src="img/checklist.png" alt="Icon">
                    <div class="menu-title">เครื่องมือสนับสนุน<br>การปฏิบัติงาน</div>
                </a>
            </div>
        </div>

        <div class="mobile-menu-list">
            <a href="dashboard.html" class="mobile-card card-pink">
                <img class="m-icon" src="img/data-analysis.png" alt="Icon">
                <div class="m-title">ผลการดำเนินงาน & Dashboard</div>
            </a>
            <a href="indicators.html" class="mobile-card card-orange">
                <img class="m-icon" src="img/moneybag.png" alt="Icon">
                <div class="m-title">ตัวชี้วัดและการประเมินผล</div>
            </a>
            <a href="debt.html" class="mobile-card card-blue">
                <img class="m-icon" src="img/chat.png" alt="Icon">
                <div class="m-title">การบริหารเงินทุนและหนี้</div>
            </a>
            <a href="tools.html" class="mobile-card card-green">
                <img class="m-icon" src="img/checklist.png" alt="Icon">
                <div class="m-title">เครื่องมือสนับสนุนการปฏิบัติงาน</div>
            </a>
        </div>

    </div>

</body>
</html>
